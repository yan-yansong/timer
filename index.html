<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>严帝统治世界健身计时器</title>
	<style>
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 25%, #2d1b69 50%, #1f0f3d 75%, #0f172a 100%);
			background-size: 400% 400%;
			animation: gradientShift 15s ease infinite;
			color: #f8fafc;
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 24px;
		}
		@keyframes gradientShift {
			0% { background-position: 0% 50%; }
			50% { background-position: 100% 50%; }
			100% { background-position: 0% 50%; }
		}
		.container {
			width: 100%;
			max-width: 540px;
			background: rgba(15, 23, 42, 0.7);
			backdrop-filter: blur(10px);
			border: 2px solid rgba(236, 72, 153, 0.3);
			border-radius: 24px;
			box-shadow: 0 8px 32px rgba(236, 72, 153, 0.15), 
			            0 0 60px rgba(139, 92, 246, 0.1),
			            inset 0 1px 0 rgba(255, 255, 255, 0.1);
			padding: 32px;
		}
		h1 {
			margin: 0 0 18px;
			font-size: 2.2rem;
			text-align: center;
			font-weight: 800;
			background: linear-gradient(135deg, #ec4899, #f97316, #eab308);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
			letter-spacing: 1px;
		}
		label {
			display: block;
			margin: 12px 0 6px;
			font-size: 0.95rem;
			color: #e2e8f0;
			font-weight: 600;
			letter-spacing: 0.5px;
		}
		input[type="number"], input[type="range"] {
			width: 100%;
			padding: 12px 14px;
			border-radius: 12px;
			border: 1.5px solid rgba(236, 72, 153, 0.4);
			background: rgba(15, 23, 42, 0.8);
			color: #f8fafc;
			font-size: 1rem;
			transition: all 0.3s ease;
		}
		input[type="number"]:focus, input[type="range"]:focus {
			border-color: #ec4899;
			box-shadow: 0 0 20px rgba(236, 72, 153, 0.3), inset 0 0 10px rgba(236, 72, 153, 0.1);
			outline: none;
		}
		input[type="range"] {
			padding: 0;
			cursor: pointer;
			-webkit-appearance: none;
			appearance: none;
			width: 100%;
			height: 8px;
			background: transparent;
		}
		input[type="range"]::-webkit-slider-runnable-track {
			height: 8px;
			background: linear-gradient(90deg, rgba(236, 72, 153, 0.3), rgba(249, 115, 22, 0.3));
			border-radius: 4px;
			box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
		}
		input[type="range"]::-moz-range-track {
			height: 8px;
			background: linear-gradient(90deg, rgba(236, 72, 153, 0.3), rgba(249, 115, 22, 0.3));
			border-radius: 4px;
			border: none;
			box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
		}
		input[type="range"]::-moz-range-progress {
			background: linear-gradient(90deg, #ec4899, #f97316);
			height: 8px;
			border-radius: 4px;
			box-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
		}
		input[type="range"]::-webkit-slider-thumb {
			-webkit-appearance: none;
			appearance: none;
			width: 18px;
			height: 18px;
			border-radius: 50%;
			background: linear-gradient(135deg, #ec4899, #f97316);
			cursor: pointer;
			box-shadow: 0 0 20px rgba(236, 72, 153, 0.7), 0 4px 12px rgba(0, 0, 0, 0.3);
			transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
			position: relative;
		}
		input[type="range"]::-webkit-slider-thumb:hover {
			transform: scale(1.25);
			box-shadow: 0 0 30px rgba(236, 72, 153, 0.9), 0 6px 16px rgba(0, 0, 0, 0.4);
			cursor: pointer;
		}
		input[type="range"]::-webkit-slider-thumb:active {
			transform: scale(1.15);
			box-shadow: 0 0 25px rgba(236, 72, 153, 0.8), 0 2px 8px rgba(0, 0, 0, 0.3);
		}
		input[type="range"]::-moz-range-thumb {
			width: 18px;
			height: 18px;
			border-radius: 50%;
			background: linear-gradient(135deg, #ec4899, #f97316);
			cursor: pointer;
			border: none;
			box-shadow: 0 0 20px rgba(236, 72, 153, 0.7), 0 4px 12px rgba(0, 0, 0, 0.3);
			transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
		}
		input[type="range"]::-moz-range-thumb:hover {
			transform: scale(1.25);
			box-shadow: 0 0 30px rgba(236, 72, 153, 0.9), 0 6px 16px rgba(0, 0, 0, 0.4);
			cursor: pointer;
		}
		input[type="range"]::-moz-range-thumb:active {
			transform: scale(1.15);
		}
		.speed-scale {
			display: flex;
			justify-content: space-between;
			padding: 0 12px;
			font-size: 0.75rem;
			color: #a78bfa;
			margin-top: 8px;
			margin-bottom: 12px;
			font-weight: 600;
		}
		.speed-scale span {
			width: 2px;
			height: 6px;
				
			display: flex;
			align-items: flex-end;
			justify-content: center;
			font-size: 0.65rem;
			color: #a78bfa;
			border-radius: 1px;
			padding-top: 8px;
		}
		.controls {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			margin-top: 24px;
		}
		button {
			flex: 1 1 120px;
			padding: 14px 16px;
			border: none;
			border-radius: 14px;
			font-size: 1rem;
			font-weight: 700;
			cursor: pointer;
			transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
			letter-spacing: 0.5px;
			box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
		}
		button:hover:not(:disabled) {
			transform: translateY(-3px);
			box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
		}
		button:active:not(:disabled) {
			transform: translateY(-1px);
		}
		button:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}
		.start {
			background: linear-gradient(135deg, #10b981, #14b8a6);
			color: #fff;
			box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
		}
		.start:hover:not(:disabled) {
			box-shadow: 0 8px 30px rgba(16, 185, 129, 0.6);
		}
		.pause {
			background: linear-gradient(135deg, #f59e0b, #f97316);
			color: #fff;
			box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4);
		}
		.pause:hover:not(:disabled) {
			box-shadow: 0 8px 30px rgba(245, 158, 11, 0.6);
		}
		.reset {
			background: linear-gradient(135deg, #8b5cf6, #a855f7);
			color: #fff;
			box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
		}
		.reset:hover:not(:disabled) {
			box-shadow: 0 8px 30px rgba(139, 92, 246, 0.6);
		}
		.card {
			margin-top: 24px;
			background: rgba(30, 41, 59, 0.6);
			backdrop-filter: blur(10px);
			border-radius: 20px;
			padding: 24px;
			text-align: center;
			border: 1.5px solid rgba(236, 72, 153, 0.2);
			box-shadow: 0 0 40px rgba(236, 72, 153, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.05);
		}
		.time {
			font-size: 3.5rem;
			margin: 16px 0 8px;
			letter-spacing: 0.1em;
			background: linear-gradient(90deg, #ec4899, #f97316, #eab308, #ec4899);
			background-size: 300% 300%;
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
			font-weight: 900;
			animation: colorShift 3s ease infinite;
			text-shadow: 0 0 30px rgba(236, 72, 153, 0.3);
		}
		@keyframes colorShift {
			0%, 100% { background-position: 0% 50%; }
			50% { background-position: 100% 50%; }
		}
		.status {
			color: #94a3b8;
			font-size: 1rem;
			font-weight: 600;
			letter-spacing: 0.5px;
		}
		.meta {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 12px;
			margin-top: 16px;
			color: #a8d5ff;
			font-size: 0.95rem;
			font-weight: 500;
		}
		@media (max-width: 600px) {
			body {
				padding: 8px;
			}
			.container {
				padding: 12px;
				max-width: 100%;
				border-radius: 16px;
			}
			h1 {
				font-size: 1.3rem;
				margin-bottom: 8px;
				letter-spacing: 0.5px;
			}
			label {
				font-size: 0.8rem;
				margin: 6px 0 3px;
				font-weight: 500;
			}
			input[type="number"], input[type="range"] {
				padding: 8px 10px;
				font-size: 0.9rem;
				margin-bottom: 2px;
			}
			.card {
				margin-top: 12px;
				margin-bottom: 0;
				padding: 14px;
				border-radius: 16px;
			}
			.time {
				font-size: 2.8rem;
				margin: 8px 0 4px;
			}
			.status {
				font-size: 0.85rem;
			}
			.meta {
				grid-template-columns: repeat(2, 1fr);
				gap: 6px;
				margin-top: 8px;
				font-size: 0.75rem;
			}
			.speed-scale {
				padding: 0 4px;
				margin-top: 4px;
				margin-bottom: 6px;
				font-size: 0.65rem;
			}
			.controls {
				gap: 6px;
				margin-top: 12px;
			}
			button {
				flex: 1;
				padding: 10px 8px;
				font-size: 0.9rem;
				min-height: 40px;
				font-weight: 600;
			}
			button:active {
				opacity: 0.85;
			}
		}
		@media (max-height: 800px) and (max-width: 600px) {
			.container {
				padding: 10px;
			}
			h1 {
				display: none;
			}
			.card {
				padding: 10px;
				margin-top: 8px;
			}
			.time {
				font-size: 2.2rem;
				margin: 4px 0 2px;
			}
			label {
				margin: 4px 0 2px;
				font-size: 0.75rem;
			}
			input[type="number"], input[type="range"] {
				padding: 6px 8px;
				font-size: 0.8rem;
			}
			.meta {
				font-size: 0.7rem;
				gap: 4px;
			}
			.speed-scale {
				font-size: 0.6rem;
			}
			button {
				padding: 8px 6px;
				font-size: 0.8rem;
				min-height: 36px;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="card" style="margin-top: 0; margin-bottom: 24px;">
			<div class="status" id="phaseLabel">准备就绪</div>
			<div class="time" id="countdown">00:00</div>
			<div class="meta">
				<div>当前回合: <span id="currentRound">0</span>/<span id="totalRounds">0</span></div>
				<div>阶段: <span id="phaseType">-</span></div>
				<div>训练时长: <span id="workValue">30</span>秒</div>
				<div>休息时长: <span id="restValue">15</span>秒</div>
			</div>
		</div>

		<h1>俊俊健身计时器</h1>
		<label for="workDuration">训练倒计时（秒）</label>
		<input id="workDuration" type="number" min="5" value="30">

		<label for="restDuration">间隔休息（秒）</label>
		<input id="restDuration" type="number" min="5" value="15">

		<label for="rounds">循环次数</label>
		<input id="rounds" type="number" min="1" value="4">

		<label for="speedControl">倒计时速度: <span id="speedDisplay">1.0x</span></label>
		<input id="speedControl" type="range" min="0.25" max="4" step="0.1" value="1">
		<div class="speed-scale">
			<span>0.25</span>
			<span>0.5</span>
			<span>1</span>
			<span>1.5</span>
			<span>2</span>
			<span>2.5</span>
			<span>3</span>
			<span>3.5</span>
			<span>4</span>
		</div>

		<div class="controls">
			<button id="startBtn" class="start">开始</button>
			<button id="pauseBtn" class="pause" disabled>暂停</button>
			<button id="resetBtn" class="reset">重置</button>
		</div>
	</div>

	<script>
		const workInput = document.getElementById('workDuration');
		const restInput = document.getElementById('restDuration');
		const roundsInput = document.getElementById('rounds');
		const speedControl = document.getElementById('speedControl');
		const speedDisplay = document.getElementById('speedDisplay');
		const countdownEl = document.getElementById('countdown');
		const phaseLabel = document.getElementById('phaseLabel');
		const phaseType = document.getElementById('phaseType');
		const currentRoundEl = document.getElementById('currentRound');
		const totalRoundsEl = document.getElementById('totalRounds');
		const workValueEl = document.getElementById('workValue');
		const restValueEl = document.getElementById('restValue');
		const startBtn = document.getElementById('startBtn');
		const pauseBtn = document.getElementById('pauseBtn');
		const resetBtn = document.getElementById('resetBtn');

		let timer = null;
		let remainingSeconds = 0;
		let currentRound = 0;
		let phase = 'ready';
		let paused = false;
		let audioContext = null;
		let speed = 1;
		let isRunning = false;		function formatTime(seconds) {
			const min = String(Math.floor(seconds / 60)).padStart(2, '0');
			const sec = String(seconds % 60).padStart(2, '0');
			return `${min}:${sec}`;
		}

		function updateDisplay() {
			countdownEl.textContent = formatTime(remainingSeconds);
			currentRoundEl.textContent = currentRound;
			totalRoundsEl.textContent = roundsInput.value;
			workValueEl.textContent = workInput.value;
			restValueEl.textContent = restInput.value;
			if (phase === 'ready') {
				phaseLabel.textContent = '准备就绪，点击开始';
				phaseType.textContent = '-';
			} else if (phase === 'work') {
				phaseLabel.textContent = '训练进行中';
				phaseType.textContent = '训练';
			} else if (phase === 'rest') {
				phaseLabel.textContent = '休息中';
				phaseType.textContent = '休息';
			} else if (phase === 'finished') {
				phaseLabel.textContent = '已完成';
				phaseType.textContent = '结束';
				countdownEl.textContent = '00:00';
			}
		}

		function ensureAudioContext() {
			if (!audioContext) {
				audioContext = new (window.AudioContext || window.webkitAudioContext)();
			}
		}

		function playClick() {
			ensureAudioContext();
			const osc = audioContext.createOscillator();
			const gain = audioContext.createGain();
			osc.type = 'sine';
			osc.frequency.value = 880;
			gain.gain.setValueAtTime(0.12, audioContext.currentTime);
			osc.connect(gain);
			gain.connect(audioContext.destination);
			osc.start();
			osc.stop(audioContext.currentTime + 0.08);
		}
function playRestWarningBeep() {
	ensureAudioContext();

	const osc = audioContext.createOscillator();
	const gain = audioContext.createGain();

	osc.type = 'triangle';
	osc.frequency.value = 500;

	gain.gain.setValueAtTime(0.18, audioContext.currentTime);

	osc.connect(gain);
	gain.connect(audioContext.destination);

	osc.start();
	osc.stop(audioContext.currentTime + 0.12);
}

function playReadyTrainBeep() {
	ensureAudioContext();

	const osc = audioContext.createOscillator();
	const gain = audioContext.createGain();

	osc.type = 'square';
	osc.frequency.value = 1400;

	gain.gain.setValueAtTime(0.18, audioContext.currentTime);

	osc.connect(gain);
	gain.connect(audioContext.destination);

	osc.start();
	osc.stop(audioContext.currentTime + 0.08);
}
		function startTimer() {
			const workSeconds = Math.max(5, parseInt(workInput.value, 10) || 30);
			const restSeconds = Math.max(5, parseInt(restInput.value, 10) || 15);
			const totalRounds = Math.max(1, parseInt(roundsInput.value, 10) || 1);
			if (phase === 'ready' || phase === 'finished') {
				currentRound = 1;
				phase = 'work';
				remainingSeconds = workSeconds;
				phaseLabel.textContent = '训练进行中';
				phaseType.textContent = '训练';
			}
			paused = false;
			startBtn.disabled = true;
			pauseBtn.disabled = false;
			workInput.disabled = true;
			restInput.disabled = true;
			roundsInput.disabled = true;
			speedControl.disabled = false;

			if (timer) {
				clearInterval(timer);
			}

			playClick();
			updateDisplay();
			isRunning = true;
			createTimer();
		}

		function createTimer() {
			const workSeconds = Math.max(5, parseInt(workInput.value, 10) || 30);
			const restSeconds = Math.max(5, parseInt(restInput.value, 10) || 15);
			const totalRounds = Math.max(1, parseInt(roundsInput.value, 10) || 1);
			
			if (timer) {
				clearInterval(timer);
			}
			
			const timerInterval = Math.max(100, 1000 / speed);
			timer = setInterval(() => {
				if (paused) return;
				remainingSeconds -= 1;

// ===== 训练阶段 =====
if (phase === 'work') {

	// 最后3秒：特殊提示（即将休息）
	if (remainingSeconds > 0 && remainingSeconds <= 3) {
		playRestWarningBeep();
	} else if (remainingSeconds >= 0) {
		// 普通训练提示音
		playClick();
	}
}

// ===== 休息阶段 =====
if (phase === 'rest') {

	// 休息时平时静音
	// 最后3秒：提示准备训练
	if (remainingSeconds > 0 && remainingSeconds <= 3) {
		playReadyTrainBeep();
	}
}
				if (remainingSeconds <= 0) {
					if (phase === 'work') {
						if (currentRound >= totalRounds) {
							finishTimer();
							return;
						}
						phase = 'rest';
						remainingSeconds = restSeconds;
						phaseLabel.textContent = '休息中';
						phaseType.textContent = '休息';
					} else if (phase === 'rest') {
						currentRound += 1;
						phase = 'work';
						remainingSeconds = workSeconds;
						phaseLabel.textContent = '训练进行中';
						phaseType.textContent = '训练';
					}
				}
				updateDisplay();
			}, timerInterval);
		}

		function pauseTimer() {
			paused = true;
			pauseBtn.disabled = true;
			startBtn.disabled = false;
			phaseLabel.textContent = '已暂停';
		}

		function resetTimer() {
			if (timer) {
				clearInterval(timer);
				timer = null;
			}
			phase = 'ready';
			currentRound = 0;
			remainingSeconds = parseInt(workInput.value, 10) || 30;
			paused = false;
			isRunning = false;
			startBtn.disabled = false;
			pauseBtn.disabled = true;
			workInput.disabled = false;
			restInput.disabled = false;
			roundsInput.disabled = false;
			speedControl.disabled = false;
			updateDisplay();
		}

		function finishTimer() {
			if (timer) {
				clearInterval(timer);
				timer = null;
			}
			phase = 'finished';
			paused = false;
			isRunning = false;
			startBtn.disabled = false;
			pauseBtn.disabled = true;
			workInput.disabled = false;
			restInput.disabled = false;
			roundsInput.disabled = false;
			speedControl.disabled = false;
			updateDisplay();
		}

		startBtn.addEventListener('click', () => {
			if (audioContext && audioContext.state === 'suspended') {
				audioContext.resume();
			}
			startTimer();
		});
		pauseBtn.addEventListener('click', pauseTimer);
		resetBtn.addEventListener('click', resetTimer);
		workInput.addEventListener('input', updateDisplay);
		restInput.addEventListener('input', updateDisplay);
		roundsInput.addEventListener('input', updateDisplay);
		speedControl.addEventListener('input', (e) => {
			speed = parseFloat(e.target.value);
			speedDisplay.textContent = speed.toFixed(1) + 'x';
			if (isRunning && !paused) {
				createTimer();
			}
		});

		resetTimer();
	</script>
</body>
</html>
